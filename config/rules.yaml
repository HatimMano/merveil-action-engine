# Action Engine — Configuration des règles
# ==========================================
# Lie chaque rule_name (dbt) à une ou plusieurs destinations.
#
# Ajouter une règle :
#   1. Créer le SQL dans dbt/models/rules/rule_<name>.sql
#   2. L'ajouter dans dbt/models/rules/pending_actions.sql
#   3. Déclarer ici les destinations avec leurs paramètres
#
# Ajouter une destination :
#   1. Créer src/handlers/<destination>.py
#   2. L'importer dans src/core/runner.py

rules:

  low_review_cleanliness:
    enabled: true
    # Cooldown : ne pas re-déclencher si un trigger "open" existe déjà
    # pour la même (rule_name, property_id)
    destinations:
      - type: breezeway_task
        params:
          name_template: "Inspection propreté — {home_name}"
          department: housekeeping
          priority: high

