# Action Engine — Configuration
# ==============================
#
# `rules` : handlers non-digest (Breezeway, etc.)
#   Chaque rule_name correspond à une entrée dans pending_actions.
#
# `digest` : config email par fréquence (4h / daily / weekly / monthly)
#   L'action-engine lit rule_{freq} et envoie 1 mail groupé.

rules:

  champagne_direct:
    enabled: false
    destinations:
      - type: breezeway_task
        params:
          name_template: "Bouteille de champagne — {apartment_name}"
          department: housekeeping
          subdepartment: linge_conso_logistique
          priority: normal
          assign_economat: true
          assign_cleaning_team: true

  low_review_cleanliness:
    enabled: true
    destinations:
      - type: breezeway_task
        params:
          name_template: "Inspection propreté — {home_name}"
          department: housekeeping
          priority: high

digest:
  4h:
    to: "hatim@archides.fr"   # TEST — prod: alertes@archides.fr
    send_if_empty: true

  daily:
    to: "hatim@archides.fr"   # TEST — prod: alertes@archides.fr
    send_if_empty: false

  weekly:
    to: "hatim@archides.fr"   # TEST — prod: alertes@archides.fr
    send_if_empty: false
